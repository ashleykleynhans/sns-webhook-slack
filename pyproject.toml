[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=webhook --cov-report=term-missing"
filterwarnings = [
    "ignore::DeprecationWarning:reactivex",
]

[tool.coverage.run]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.",
    "except ImportError",
]
